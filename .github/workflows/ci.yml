name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: vscode-extension/package-lock.json
        
    - name: Install dependencies
      working-directory: vscode-extension
      run: npm ci
      
    - name: Validate JSON files
      working-directory: vscode-extension
      run: npm run lint:json
      
    - name: Run linting
      working-directory: vscode-extension
      run: npm run lint
      
    - name: Run type checking
      working-directory: vscode-extension
      run: npm run check-types
      
    - name: Compile extension
      working-directory: vscode-extension
      run: npm run compile
      
    - name: Package extension
      working-directory: vscode-extension
      run: npm run package
      
    - name: Compile tests
      working-directory: vscode-extension
      run: npm run compile-tests

    - name: Run Node.js unit tests
      working-directory: vscode-extension
      shell: bash
      run: |
        set +e
        node --require ./out/test/unit/vscode-shim-register.js \
          --experimental-test-coverage \
          --test \
          --test-force-exit \
          --test-coverage-include=out/src/backend/**/*.js \
          --test-coverage-include=out/src/utils/**/*.js \
          out/test/unit/*.test.js 2>&1 | tee "$RUNNER_TEMP/test-output.txt"
        status=${PIPESTATUS[0]}
        set -e
        exit "$status"

    - name: Publish test results to step summary
      if: always() && matrix.node-version == '24.x'
      shell: bash
      run: node scripts/parse-test-output.js "$RUNNER_TEMP/test-output.txt" >> "$GITHUB_STEP_SUMMARY"
      
    - name: Run tests
      uses: coactions/setup-xvfb@b6b4fcfb9f5a895edadc3bc76318fae0ac17c8b3 # v1.0.1
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        run: cd vscode-extension && npm test
        options: -screen 0 1024x768x24
      continue-on-error: true  # VS Code extension tests can be flaky in CI
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: matrix.node-version == '24.x'
      with:
        name: extension-build
        path: |
          vscode-extension/dist/
          vscode-extension/out/
        retention-days: 7
        
  package:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: vscode-extension/package-lock.json
        
    - name: Install dependencies
      working-directory: vscode-extension
      run: npm ci
      
    - name: Package extension
      working-directory: vscode-extension
      run: npm run package
      
    - name: Create VSIX package
      working-directory: vscode-extension
      run: npx vsce package
      
    - name: Upload VSIX package
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: vsix-package
        path: 'vscode-extension/*.vsix'
        retention-days: 30
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: vscode-extension/package-lock.json
        
    - name: Install dependencies
      working-directory: vscode-extension
      run: npm ci
      
    - name: Validate JSON files
      working-directory: vscode-extension
      run: npm run lint:json
      
    - name: Run linting
      working-directory: vscode-extension
      run: npm run lint

    - name: Run complexity analysis
      working-directory: vscode-extension
      shell: bash
      run: npm run --silent lint:report > "$RUNNER_TEMP/lint-output.json" 2>/dev/null || true

    - name: Publish complexity results to step summary
      if: always() && matrix.node-version == '24.x'
      shell: bash
      run: node scripts/parse-lint-output.js "$RUNNER_TEMP/lint-output.json" >> "$GITHUB_STEP_SUMMARY"

    - name: Run type checking
      working-directory: vscode-extension
      run: npm run check-types
      
    - name: Compile extension
      working-directory: vscode-extension
      run: npm run compile
      
    - name: Package extension
      working-directory: vscode-extension
      run: npm run package
      
    - name: Compile tests
      working-directory: vscode-extension
      run: npm run compile-tests

    - name: Run Node.js unit tests
      working-directory: vscode-extension
      shell: bash
      run: |
        set +e
        node --require ./out/test/unit/vscode-shim-register.js \
          --experimental-test-coverage \
          --test \
          --test-force-exit \
          --test-coverage-include=out/src/backend/**/*.js \
          --test-coverage-include=out/src/utils/**/*.js \
          out/test/unit/*.test.js 2>&1 | tee "$RUNNER_TEMP/test-output.txt"
        status=${PIPESTATUS[0]}
        set -e
        exit "$status"

    - name: Publish test results to step summary
      if: always() && matrix.node-version == '24.x'
      shell: bash
      run: node scripts/parse-test-output.js "$RUNNER_TEMP/test-output.txt" >> "$GITHUB_STEP_SUMMARY"
      
    - name: Install and start Xvfb
      run: |
        sudo apt-get install -y xvfb
        Xvfb :99 -screen 0 1024x768x24 &

    - name: Run tests
      run: cd vscode-extension && npm test
      continue-on-error: true  # VS Code extension tests can be flaky in CI
      env:
        DISPLAY: :99
      # coactions/setup-xvfb was abandoned on Node.js 20 (no node24 support).
      # Using manual xvfb instead to avoid the Node.js deprecation warning.
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: matrix.node-version == '24.x'
      with:
        name: extension-build
        path: |
          vscode-extension/dist/
          vscode-extension/out/
        retention-days: 7
        
  package:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: vscode-extension/package-lock.json
        
    - name: Install dependencies
      working-directory: vscode-extension
      run: npm ci
      
    - name: Package extension
      working-directory: vscode-extension
      run: npm run package
      
    - name: Create VSIX package
      working-directory: vscode-extension
      run: npx vsce package
      
    - name: Upload VSIX package
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: vsix-package
        path: 'vscode-extension/*.vsix'
        retention-days: 30
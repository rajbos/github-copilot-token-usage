name: Update Model Data

on:
  schedule:
    # Run daily at 08:15 UTC, shortly after the source repo typically publishes.
    - cron: '15 8 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-model-data.yml
      - scripts/update-model-data.py

permissions:
  contents: read

jobs:
  update-model-data:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && !startsWith(github.ref_name, 'dependabot/')

    permissions:
      contents: write      # needed to create branches and push changes
      pull-requests: write  # needed to create PRs

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Update model data from notifier
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update-model-data.py | tee /tmp/update-output.txt
          # Extract the source SHA for the PR body
          SOURCE_SHA=$(grep '^SOURCE_SHA=' /tmp/update-output.txt | cut -d= -f2 || echo '<unknown>')
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          cat /tmp/update-output.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js (for JSON validation)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Validate JSON files
        working-directory: vscode-extension
        run: npm run lint:json

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: update/model-data
          add-paths: |
            vscode-extension/src/modelPricing.json
            vscode-extension/src/tokenEstimators.json
          commit-message: |
            chore: sync model data from rajbos/github-copilot-model-notifier

            Updates multiplier and tier values in modelPricing.json, refreshes
            releaseStatus in copilotPricing blocks, and adds stub entries for
            new models published by the notifier.

            Source SHA: ${{ steps.update.outputs.source_sha }}
          title: "chore: sync model data from rajbos/github-copilot-model-notifier"
          body: |
            This pull request updates model configuration files with the latest
            data from [rajbos/github-copilot-model-notifier](https://github.com/rajbos/github-copilot-model-notifier/blob/main/data/models.json).

            **Updated Files:**
            - `vscode-extension/src/modelPricing.json` — model multipliers, tiers, and `copilotPricing.releaseStatus`
            - `vscode-extension/src/tokenEstimators.json` — token estimators for new models

            **⚠️ Note:** New model pricing stubs are set to `$0.00` by default and require
            manual verification before merging. See the
            [pricing sources](https://github.com/rajbos/ai-engineering-fluency/blob/main/vscode-extension/src/modelPricing.json#L6)
            in `modelPricing.json` for reference URLs.

            **Source data SHA:** `${{ steps.update.outputs.source_sha }}`

            ---

            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          labels: |
            autogenerated
            maintenance

      - name: Summary
        run: |
          if [ "${{ steps.create_pr.outputs.pull-request-created }}" == "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ Pull request created: ${{ steps.create_pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.create_pr.outputs.pull-request-number }}" != "" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "🔄 Existing pull request updated: ${{ steps.create_pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "ℹ️ Model data is already up to date — no pull request needed." >> "$GITHUB_STEP_SUMMARY"
          fi

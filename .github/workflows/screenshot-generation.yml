name: Generate Extension Screenshots

permissions:
  contents: read

on:
  workflow_dispatch:

  push:
    paths:
      - 'vscode-extension/src/**'
      - 'scripts/generate-all-previews.js'
      - 'scripts/capture-screenshots.js'
      - 'test-data/**'
      - '.github/workflows/screenshot-generation.yml'

jobs:
  generate-screenshots:
    name: Generate UI Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify test data exists
        run: |
          echo "Checking test data..."
          ls -la test-data/chatSessions/
          echo "Found $(find test-data/chatSessions -name '*.json' | wc -l) test session files"

      - name: Generate HTML previews from test data
        run: node scripts/generate-all-previews.js

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Capture screenshots
        run: node scripts/capture-screenshots.js

      - name: List generated screenshots
        run: |
          echo "=== Generated Screenshots ==="
          ls -lh docs/images/screenshots/*.png
          echo ""
          echo "Total: $(find docs/images/screenshots -name '*.png' | wc -l) screenshots"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: extension-screenshots
          path: docs/images/screenshots/*.png
          retention-days: 90

      - name: Workflow Summary
        if: always()
        run: |
          echo "## 📸 Screenshot Generation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if ls docs/images/screenshots/*.png 1> /dev/null 2>&1; then
            echo "### ✅ Screenshots Generated" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            for f in docs/images/screenshots/*.png; do
              size=$(du -h "$f" | cut -f1)
              echo "- \`$(basename "$f")\` ($size)" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "### ❌ No screenshots found" >> "$GITHUB_STEP_SUMMARY"
          fi